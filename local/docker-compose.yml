services:
  minecraft:
    image: "itzg/minecraft-server:java21"
    container_name: "minecraft"
    restart: unless-stopped
    ports:
      - "25565:25565"
    deploy:
      resources:
        limits:
          memory: 12.5G    # Absolute ceiling to protect SSH/Host OS
          cpus: '3.0'    # Limits Java to 3 cores (adjust based on your CPU)
    env_file:
      - ./config-overrides/minecraft-public.env  # Load first
      - ./config-overrides/minecraft-private.env # Load second (Can include sensitive info)
    environment:
      EULA: "TRUE"
      TYPE: "AUTO_CURSEFORGE"
      CF_API_KEY: "${CF_API_KEY}"
      CF_SLUG: "${MODPACK_SLUG}"
      REMOVE_OLD_MODS: "true"
      REMOVE_OLD_MODS_DEPTH: 1
      INIT_MEMORY: "10G"
      MAX_MEMORY: "10G"
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD}"
      MODS: "https://www.curseforge.com/minecraft/mc-mods/serverpauser"

      JVM_OPTS: >
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+AlwaysPreTouch
        -XX:G1NewSizePercent=30
        -XX:G1MaxNewSizePercent=60
        -XX:G1HeapRegionSize=16M
        -XX:G1ReservePercent=20
        -XX:G1HeapWastePercent=5
        -XX:G1MixedGCCountTarget=4
        -XX:InitiatingHeapOccupancyPercent=15
        -XX:G1MixedGCLiveThresholdPercent=90
        -XX:G1RSetUpdatingPauseTimePercent=5
        -XX:SurvivorRatio=32
        -XX:+PerfDisableSharedMem
        -XX:MaxTenuringThreshold=1
        -XX:+UseStringDeduplication

    volumes:
      - "./instances/${DATA_FOLDER}:/data"
      - "./config-overrides/serverpauser.toml:/data/config/serverpauser.toml"

  backup:
      image: itzg/mc-backup
      container_name: "minecraft-backup"
      restart: unless-stopped
      environment:
        RCON_HOST: minecraft
        RCON_PORT: 25575
        RCON_PASSWORD: "${RCON_PASSWORD}"
        BACKUP_INTERVAL: "1h"
        PRUNE_BACKUPS_DAYS: 7
        BACKUP_METHOD: restic
        RESTIC_PASSWORD: "${RESTIC_PASSWORD}"
        RESTIC_REPOSITORY: "/backups"
      volumes:
        - "./instances/${DATA_FOLDER}:/data:ro"
        - "./backups/${DATA_FOLDER}:/backups/"

  frpc:
    image: snowdreamtech/frpc
    container_name: frpc
    restart: unless-stopped
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml
    network_mode: "host"